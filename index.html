<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>植物大战僵尸</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="game-container">
        <!-- 菜单界面 -->
        <div id="menu-screen" class="screen active">
            <div class="menu-background">
                <div class="lawn-pattern"></div>
                <div class="fireworks">
                    <div class="firework" style="left: 20%; top: 20%;"></div>
                    <div class="firework" style="left: 50%; top: 15%;"></div>
                    <div class="firework" style="left: 80%; top: 25%;"></div>
                </div>
                <div class="lanterns">
                    <div class="lantern" style="left: 5%; top: 10%;">🏮</div>
                    <div class="lantern" style="left: 15%; top: 15%;">🏮</div>
                    <div class="lantern" style="right: 15%; top: 15%;">🏮</div>
                    <div class="lantern" style="right: 5%; top: 10%;">🏮</div>
                </div>
                <div class="paper-cuttings">
                    <div class="paper-cutting" style="left: 8%; bottom: 25%;">🐴</div>
                    <div class="paper-cutting" style="right: 10%; bottom: 30%;">🐴</div>
                </div>
            </div>
            <div class="menu-content">
                <h1 class="game-title">
                    <span class="title-plant">🌱</span>
                    植物大战僵尸
                    <span class="title-zombie">🧟</span>
                </h1>
                <div class="year-badge">🐎 马年大吉 🐎</div>
                <div class="menu-plants">
                    <div class="floating-plant" style="left: 10%;">🌻</div>
                    <div class="floating-plant" style="left: 30%; animation-delay: -2s;">🌷</div>
                    <div class="floating-plant" style="left: 70%; animation-delay: -4s;">🌹</div>
                    <div class="floating-plant" style="left: 90%; animation-delay: -1s;">🥕</div>
                </div>
                <button id="start-btn" class="menu-btn">开始游戏</button>
                <div class="menu-buttons">
                    <button id="shop-btn" class="menu-btn secondary-btn">商店</button>
                    <button id="plant-book-btn" class="menu-btn secondary-btn">植物图鉴</button>
                    <button id="zombie-book-btn" class="menu-btn secondary-btn">僵尸图鉴</button>
                    <button id="settings-btn" class="menu-btn secondary-btn">设置</button>
                </div>
            </div>
        </div>

        <!-- 关卡选择界面 -->
        <div id="level-screen" class="screen">
            <div class="level-background">
                <div class="lawn-pattern"></div>
            </div>
            <div class="level-content">
                <h2 class="level-title">选择关卡</h2>
                <div class="level-cards">
                    <div class="level-card" data-level="1">
                        <div class="level-number">1</div>
                        <div class="level-name">草地初战</div>
                        <div class="level-difficulty easy">简单</div>
                        <div class="level-info">
                            <p>白天场景</p>
                            <p>5波 × 5只</p>
                        </div>
                    </div>
                    <div class="level-card" data-level="2">
                        <div class="level-number">2</div>
                        <div class="level-name">迷雾之夜</div>
                        <div class="level-difficulty medium">中等</div>
                        <div class="level-info">
                            <p>夜晚 + 迷雾</p>
                            <p>7波 × 6只</p>
                        </div>
                    </div>
                    <div class="level-card" data-level="3">
                        <div class="level-number">3</div>
                        <div class="level-name">倾斜屋顶</div>
                        <div class="level-difficulty hard">困难</div>
                        <div class="level-info">
                            <p>屋顶场景</p>
                            <p>9波 × 8只</p>
                        </div>
                    </div>
                </div>
                <button id="back-to-menu" class="menu-btn back-btn">返回菜单</button>
            </div>
        </div>

        <!-- 游戏界面 -->
        <div id="game-screen" class="screen">
            <!-- 顶部状态栏 -->
            <div class="game-header">
                <div class="sun-counter">
                    <span class="sun-icon">☀️</span>
                    <span id="sun-amount">50</span>
                </div>
                <div class="wave-info">
                    <span>波次: </span>
                    <span id="current-wave">1</span> / <span id="total-waves">3</span>
                </div>
                <div class="score-info">
                    <span>分数: </span>
                    <span id="score">0</span>
                </div>
                <button id="back-to-level" class="small-btn">退出</button>
            </div>

            <!-- 植物选择栏 -->
            <div class="plant-selection">
                <div class="plant-card" data-plant="peashooter" data-cost="100">
                    <div class="plant-emoji">🫛</div>
                    <div class="plant-name">豌豆射手</div>
                    <div class="plant-cost">100 ☀️</div>
                </div>
                <div class="plant-card" data-plant="sunflower" data-cost="50">
                    <div class="plant-emoji">🌻</div>
                    <div class="plant-name">向日葵</div>
                    <div class="plant-cost">50 ☀️</div>
                </div>
                <div class="plant-card" data-plant="wallnut" data-cost="50">
                    <div class="plant-emoji">🥜</div>
                    <div class="plant-name">坚果墙</div>
                    <div class="plant-cost">50 ☀️</div>
                </div>
                <div class="plant-card" data-plant="potatomine" data-cost="25">
                    <div class="plant-emoji">💣</div>
                    <div class="plant-name">土豆地雷</div>
                    <div class="plant-cost">25 ☀️</div>
                </div>
                <div class="plant-card" data-plant="jalapeno" data-cost="125">
                    <div class="plant-emoji">🌶️</div>
                    <div class="plant-name">火爆辣椒</div>
                    <div class="plant-cost">125 ☀️</div>
                </div>
                <div class="plant-card" data-plant="cherrybomb" data-cost="150">
                    <div class="plant-emoji">🍒</div>
                    <div class="plant-name">樱桃炸弹</div>
                    <div class="plant-cost">150 ☀️</div>
                </div>
                <div class="plant-card" data-plant="snowpea" data-cost="175">
                    <div class="plant-emoji">🥦</div>
                    <div class="plant-name">寒冰射手</div>
                    <div class="plant-cost">175 ☀️</div>
                </div>
            </div>

            <!-- 游戏草坪 -->
            <div class="game-lawn">
                <div class="lawn-grid" id="lawn-grid">
                    <!-- 5行9列的格子 -->
                </div>
            </div>

            <!-- 游戏元素层 -->
            <div id="game-elements">
                <!-- 植物、僵尸、子弹将在这里动态生成 -->
            </div>

            <!-- 阳光元素容器 -->
            <div id="sun-elements">
                <!-- 掉落的阳光 -->
            </div>
        </div>

        <!-- 游戏结束界面 -->
        <div id="gameover-screen" class="screen">
            <div class="gameover-content">
                <div class="gameover-icon">💀</div>
                <h2 class="gameover-title">僵尸吃掉了你的脑子!</h2>
                <div class="final-score">
                    <span>最终分数: </span>
                    <span id="final-score">0</span>
                </div>
                <div class="gameover-buttons">
                    <button id="retry-btn" class="menu-btn">重新开始</button>
                    <button id="gameover-menu-btn" class="menu-btn">返回菜单</button>
                </div>
            </div>
        </div>

        <!-- 胜利界面 -->
        <div id="victory-screen" class="screen">
            <div class="victory-content">
                <div class="victory-icon">🏆</div>
                <h2 class="victory-title">恭喜过关!</h2>
                <div class="final-score">
                    <span>最终分数: </span>
                    <span id="victory-score">0</span>
                </div>
                <div class="victory-buttons">
                    <button id="victory-retry-btn" class="menu-btn">再玩一次</button>
                    <button id="victory-menu-btn" class="menu-btn">返回菜单</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/level.js"></script>
    <script src="js/plant.js"></script>
    <script src="js/zombie.js"></script>
    <script src="js/bullet.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
